services:
  db-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cockroachdb-proxy
    ports:
      - "8080:8080"
    environment:
      # Set this to a strong value for production
      - API_KEY=${API_KEY:-}
      # CockroachDB connection (defaults baked into main.py work too)
      - COCKROACH_HOST=${COCKROACH_HOST:-vortex-giraffe-15678.jxf.gcp-us-east1.cockroachlabs.cloud}
      - COCKROACH_PORT=${COCKROACH_PORT:-26257}
      - COCKROACH_USER=${COCKROACH_USER:-cubiczan}
      - COCKROACH_PASSWORD=${COCKROACH_PASSWORD:-}
      - COCKROACH_SSL=${COCKROACH_SSL:-require}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
