services:
  db-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cockroachdb-proxy
    ports:
      - "8080:8080"
    environment:
      # Set this to a strong value for production
      - API_KEY=${API_KEY:-}
      # CockroachDB connection. Password must be supplied through the environment.
      - COCKROACH_HOST=${COCKROACH_HOST:-localhost}
      - COCKROACH_PORT=${COCKROACH_PORT:-26257}
      - COCKROACH_USER=${COCKROACH_USER:-root}
      - COCKROACH_PASSWORD=${COCKROACH_PASSWORD:-}
      - COCKROACH_SSL=${COCKROACH_SSL:-require}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
